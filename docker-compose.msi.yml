services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helix-msi-agent
    restart: unless-stopped
    environment:
      # Required
      AGENT_ID: msi
      AGENT_NAME: \"MSI\"
      GATEWAY_WS_URL: wss://gateway.your-domain.com/agent/ws?token=YOUR_SECRET_KEY
      AGENT_KEY: YOUR_SECRET_KEY

      # Repository
      REPO_ROOTS_JSON: '["/projects"]'

      # Logging
      LOG_LEVEL: debug

      # Limits
      MAX_OUTPUT_BYTES: 200000
      MAX_FILE_BYTES: 2000000
      MAX_SEARCH_MATCHES: 2000
      MAX_TREE_ENTRIES: 50000

      # WebSocket
      WS_PING_INTERVAL_MS: 15000
      WS_RECONNECT_MAX_MS: 30000

      # Features
      ENABLE_GIT: \"true\"
      ENABLE_RUNNER: \"true\"
      ENABLE_DOCKER: \"true\"
      ENABLE_HTTP_FETCH: \"true\"
      ENABLE_SYSTEM_TOOLS: \"true\"
      ENABLE_UNRESTRICTED_MODE: \"true\"
      AGENT_VERSION: \"1.0.0\"
      
      # Docker configuration (Linux socket)
      DOCKER_HOST: \"unix:///var/run/docker.sock\"

      # Audit Logging
      AUDIT_LOG_DIR: \"/logs\"
      AUDIT_LOG_ENABLED: \"true\"

      # Dashboard
      DASHBOARD_ENABLED: \"true\"
      DASHBOARD_PORT: \"3001\"
      DASHBOARD_AUTH_TOKEN: \"helix-admin-2026\"

    volumes:
      # Mount project directory
      - /home/msi/projects:/projects
      # Mount logs directory
      - /home/msi/helix-agent-logs:/logs
      # Docker socket for Docker tools
      - /var/run/docker.sock:/var/run/docker.sock

    # Run as root to access Docker socket
    user: \"0:0\"

    ports:
      - \"3002:3001\"  # Dashboard on port 3002 to avoid conflict

    networks:
      - helix-network

networks:
  helix-network:
    driver: bridge
